<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анализатор качества репозитория</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 900px; margin-top: 50px; }
        #progress { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Оценка качества разработки репозитория</h1>
        <div class="card">
            <div class="card-body">
                <div class="mb-3">
                    <label for="repoUrl" class="form-label">URL репозитория</label>
                    <input type="text" class="form-control" id="repoUrl" placeholder="https://github.com/user/repo" value="https://github.com/psf/requests">
                </div>
                <button id="analyzeBtn" class="btn btn-primary">Запуск анализа</button>
                <div id="progress" class="mt-3"></div>
                <div id="resultLink" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', function() {
            const url = document.getElementById('repoUrl').value.trim();
            if (!url) {
                alert('Введите URL репозитория');
                return;
            }

            const progressDiv = document.getElementById('progress');
            const resultLinkDiv = document.getElementById('resultLink');
            progressDiv.innerHTML = '<div class="alert alert-info">Запуск анализа...</div>';
            resultLinkDiv.innerHTML = '';
            const btn = this;
            btn.disabled = true;

            fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ repo_url: url })
            })
            .then(response => response.json())
            .then(data => {
                const taskId = data.task_id;
                // Периодический опрос статуса
                const interval = setInterval(() => {
                    fetch(`/status/${taskId}`)
                        .then(resp => resp.json())
                        .then(statusData => {
                            if (statusData.status === 'completed') {
                                clearInterval(interval);
                                alert('  Анализ репозитория завершён');
                                progressDiv.innerHTML = '<div class="alert alert-success">Анализ завершён</div>';
                                resultLinkDiv.innerHTML = `<a href="/report/${taskId}" class="btn btn-success me-2" target="_blank">📄 Посмотреть отчёт</a>
                                                           <a href="/download/${taskId}/excel" class="btn btn-outline-success">🟩 Скачать Excel</a>`;
                                btn.disabled = false;
                            } else if (statusData.status === 'error') {
                                clearInterval(interval);
                                progressDiv.innerHTML = `<div class="alert alert-danger">Ошибка: ${statusData.error}</div>`;
                                btn.disabled = false;
                            } else {
                                progressDiv.innerHTML = '<div class="alert alert-info">Анализ в процессе</div>';
                            }
                        })
                        .catch(err => {
                            clearInterval(interval);
                            progressDiv.innerHTML = '<div class="alert alert-danger">Ошибка соединения</div>';
                            btn.disabled = false;
                        });
                }, 2000);
            })
            .catch(err => {
                progressDiv.innerHTML = '<div class="alert alert-danger">Ошибка отправки запроса</div>';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
